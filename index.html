<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BLOCKFALL</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>BLOCKFALL</h1>
  <div class="scoreboard">
    <div class="score-item"><div class="score-label">Score</div><div class="score-val" id="score-val">0</div></div>
    <div class="score-item"><div class="score-label">Lines</div><div class="score-val" id="lines-val">0</div></div>
    <div class="score-item"><div class="score-label">Level</div><div class="score-val" id="level-val">1</div></div>
  </div>
  <button id="btn-settings" aria-label="Settings">⚙</button>
</header>

<div id="game-area">
  <div id="board-wrap"><canvas id="board"></canvas></div>
  <div id="side-panel">
    <div class="panel-box"><div class="lbl">Next</div><canvas id="next-canvas"></canvas></div>
    <div class="panel-box"><div class="lbl">Best</div><div class="score-val" id="best-val" style="font-size:.78rem;">0</div></div>
  </div>
</div>

<div id="controls">
  <button class="btn" id="btn-pause">⏸</button>
  <button class="btn" id="btn-left">◀</button>
  <button class="btn" id="btn-down">▼</button>
  <button class="btn" id="btn-right">▶</button>
  <button class="btn" id="btn-rotate">↻</button>
  <button class="btn" id="btn-drop">⤓</button>
</div>

<div id="scrim"></div>
<div id="settings-drawer">
  <div id="drawer-header">SETTINGS <button id="drawer-close">✕</button></div>
  <div id="drawer-body">
    <div class="setting-group">
      <div class="setting-title">Ghost Piece</div>
      <div class="toggle-row">
        <span class="toggle-label">Show drop outline</span>
        <label class="toggle"><input type="checkbox" id="ghost-toggle" checked><span class="toggle-slider"></span></label>
      </div>
    </div>
    <div class="setting-group">
      <div class="setting-title">Theme</div>
      <div class="theme-grid" id="theme-grid"></div>
    </div>
  </div>
</div>

<div id="overlay">
  <h2 id="overlay-title">BLOCKFALL</h2>
  <p id="overlay-msg">Arrow keys · Swipe · Buttons</p>
  <div class="big-score" id="overlay-score" style="display:none;"></div>
  <button class="overlay-btn" id="overlay-btn">START</button>
</div>

<script src="app.js"></script>
</body>
</html>
